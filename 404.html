<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loblich - Technology with style</title>
</head>
<body>
    <!-- With .htaccess mod_rewrite, this 404.html is rarely used -->
    <!-- Apache will handle the rewrite before reaching this -->
    <div style="max-width: 800px; margin: 100px auto; padding: 40px; text-align: center;">
        <h1 style="font-size: 48px; margin-bottom: 20px;">Page Not Found</h1>
        <p style="font-size: 18px; margin-bottom: 40px;">We couldn't find the page you're looking for.</p>
        <a href="/" style="display: inline-block; padding: 12px 24px; background-color: #000; color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 1px;">Go to Homepage</a>
    </div>
</body>
</html>
