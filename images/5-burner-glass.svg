<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Black glass background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  <rect x="50" y="100" width="700" height="400" rx="8" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Burner 1 -->
  <circle cx="180" cy="180" r="42" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="180" cy="180" r="26" fill="#444444"/>
  
  <!-- Burner 2 -->
  <circle cx="380" cy="160" r="45" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="380" cy="160" r="28" fill="#444444"/>
  
  <!-- Burner 3 (center) -->
  <circle cx="380" cy="290" r="52" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="380" cy="290" r="32" fill="#444444"/>
  
  <!-- Burner 4 -->
  <circle cx="580" cy="180" r="42" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="580" cy="180" r="26" fill="#444444"/>
  
  <!-- Burner 5 -->
  <circle cx="380" cy="400" r="45" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="380" cy="400" r="28" fill="#444444"/>
  
  <!-- Control knobs -->
  <circle cx="100" cy="470" r="15" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="150" cy="470" r="15" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="650" cy="470" r="15" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="700" cy="470" r="15" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Text label -->
  <text x="400" y="550" font-family="Inter" font-size="24" fill="#333333" text-anchor="middle">5 Burner - Glass Panel</text>
</svg>
