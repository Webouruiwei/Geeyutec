<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Modern kitchen background -->
  <rect width="1600" height="900" fill="#f8f8f8"/>
  
  <!-- Countertop -->
  <rect x="0" y="300" width="1600" height="600" fill="#e8e4dd"/>
  
  <!-- Gas cooktop - glass panel -->
  <rect x="300" y="350" width="1000" height="500" rx="8" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="4"/>
  
  <!-- Burner 1 -->
  <circle cx="500" cy="450" r="60" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="500" cy="450" r="40" fill="#444444"/>
  <circle cx="500" cy="450" r="20" fill="#555555"/>
  <circle cx="500" cy="450" r="5" fill="#ffffff" opacity="0.3"/>
  
  <!-- Burner 2 -->
  <circle cx="800" cy="450" r="60" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="800" cy="450" r="40" fill="#444444"/>
  <circle cx="800" cy="450" r="20" fill="#555555"/>
  <circle cx="800" cy="450" r="5" fill="#ffffff" opacity="0.3"/>
  
  <!-- Burner 3 -->
  <circle cx="500" cy="650" r="60" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="500" cy="650" r="40" fill="#444444"/>
  <circle cx="500" cy="650" r="20" fill="#555555"/>
  <circle cx="500" cy="650" r="5" fill="#ffffff" opacity="0.3"/>
  
  <!-- Burner 4 -->
  <circle cx="800" cy="650" r="60" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="2"/>
  <circle cx="800" cy="650" r="40" fill="#444444"/>
  <circle cx="800" cy="650" r="20" fill="#555555"/>
  <circle cx="800" cy="650" r="5" fill="#ffffff" opacity="0.3"/>
  
  <!-- Control knob -->
  <circle cx="1150" cy="550" r="25" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <rect x="1150" y="540" width="3" height="30" fill="#ffffff"/>
  
  <!-- Branding gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgGrad)" opacity="0.6"/>
</svg>
