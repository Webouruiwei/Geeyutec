<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Black glass background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  <rect x="50" y="100" width="700" height="400" rx="8" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Burner 1 -->
  <circle cx="250" cy="250" r="50" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="3"/>
  <circle cx="250" cy="250" r="30" fill="#444444"/>
  <circle cx="250" cy="250" r="15" fill="#555555"/>
  
  <!-- Burner 2 -->
  <circle cx="550" cy="300" r="60" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="3"/>
  <circle cx="550" cy="300" r="38" fill="#444444"/>
  <circle cx="550" cy="300" r="18" fill="#555555"/>
  
  <!-- Control knobs -->
  <circle cx="100" cy="450" r="18" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="700" cy="450" r="18" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Text label -->
  <text x="400" y="550" font-family="Inter" font-size="24" fill="#333333" text-anchor="middle">2 Burner - Glass Panel</text>
</svg>
