<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Stainless steel background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  <rect x="50" y="100" width="700" height="400" rx="8" fill="#c0c0c0" stroke="#a0a0a0" stroke-width="2"/>
  
  <!-- Brush texture for stainless -->
  <defs>
    <pattern id="stainless2" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#b8b8b8" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="50" y="100" width="700" height="400" fill="url(#stainless2)" opacity="0.3"/>
  
  <!-- Burner 1 -->
  <circle cx="200" cy="180" r="45" fill="#888888" stroke="#666666" stroke-width="2"/>
  <circle cx="200" cy="180" r="28" fill="#777777"/>
  
  <!-- Burner 2 -->
  <circle cx="550" cy="180" r="45" fill="#888888" stroke="#666666" stroke-width="2"/>
  <circle cx="550" cy="180" r="28" fill="#777777"/>
  
  <!-- Burner 3 -->
  <circle cx="200" cy="320" r="45" fill="#888888" stroke="#666666" stroke-width="2"/>
  <circle cx="200" cy="320" r="28" fill="#777777"/>
  
  <!-- Burner 4 -->
  <circle cx="550" cy="320" r="45" fill="#888888" stroke="#666666" stroke-width="2"/>
  <circle cx="550" cy="320" r="28" fill="#777777"/>
  
  <!-- Control knobs -->
  <circle cx="100" cy="450" r="16" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="160" cy="450" r="16" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="640" cy="450" r="16" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  <circle cx="700" cy="450" r="16" fill="#d32f2f" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Text label -->
  <text x="400" y="550" font-family="Inter" font-size="24" fill="#333333" text-anchor="middle">4 Burner - Stainless Steel</text>
</svg>
