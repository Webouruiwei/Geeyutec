<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#f5f5f2"/>
  
  <!-- Stainless steel countertop -->
  <rect x="0" y="350" width="1200" height="550" fill="#d4d4d0" opacity="0.8"/>
  
  <!-- 4 Burner Gas Cooktop - Black Glass -->
  <g transform="translate(100, 380)">
    <!-- Glass surface -->
    <rect x="0" y="0" width="1000" height="460" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
    
    <!-- Burner 1 - Top Left -->
    <g transform="translate(200, 100)">
      <circle cx="0" cy="0" r="58" fill="#2b2b2b" stroke="#444" stroke-width="2"/>
      <circle cx="0" cy="0" r="38" fill="#333333"/>
      <circle cx="0" cy="0" r="18" fill="#4a4a4a"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.4"/>
      <!-- Burner grate -->
      <circle cx="0" cy="0" r="72" fill="none" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="-72" y1="0" x2="-55" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="55" y1="0" x2="72" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="-72" x2="0" y2="-55" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="55" x2="0" y2="72" stroke="#555" stroke-width="3" opacity="0.6"/>
    </g>
    
    <!-- Burner 2 - Top Right -->
    <g transform="translate(700, 100)">
      <circle cx="0" cy="0" r="58" fill="#2b2b2b" stroke="#444" stroke-width="2"/>
      <circle cx="0" cy="0" r="38" fill="#333333"/>
      <circle cx="0" cy="0" r="18" fill="#4a4a4a"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.4"/>
      <circle cx="0" cy="0" r="72" fill="none" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="-72" y1="0" x2="-55" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="55" y1="0" x2="72" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="-72" x2="0" y2="-55" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="55" x2="0" y2="72" stroke="#555" stroke-width="3" opacity="0.6"/>
    </g>
    
    <!-- Burner 3 - Bottom Left -->
    <g transform="translate(200, 320)">
      <circle cx="0" cy="0" r="58" fill="#2b2b2b" stroke="#444" stroke-width="2"/>
      <circle cx="0" cy="0" r="38" fill="#333333"/>
      <circle cx="0" cy="0" r="18" fill="#4a4a4a"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.4"/>
      <circle cx="0" cy="0" r="72" fill="none" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="-72" y1="0" x2="-55" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="55" y1="0" x2="72" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="-72" x2="0" y2="-55" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="55" x2="0" y2="72" stroke="#555" stroke-width="3" opacity="0.6"/>
    </g>
    
    <!-- Burner 4 - Bottom Right -->
    <g transform="translate(700, 320)">
      <circle cx="0" cy="0" r="58" fill="#2b2b2b" stroke="#444" stroke-width="2"/>
      <circle cx="0" cy="0" r="38" fill="#333333"/>
      <circle cx="0" cy="0" r="18" fill="#4a4a4a"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.4"/>
      <circle cx="0" cy="0" r="72" fill="none" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="-72" y1="0" x2="-55" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="55" y1="0" x2="72" y2="0" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="-72" x2="0" y2="-55" stroke="#555" stroke-width="3" opacity="0.6"/>
      <line x1="0" y1="55" x2="0" y2="72" stroke="#555" stroke-width="3" opacity="0.6"/>
    </g>
    
    <!-- Control knobs -->
    <g transform="translate(920, 80)">
      <circle cx="0" cy="0" r="22" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
      <rect x="-2" y="-35" width="4" height="28" fill="#ffffff"/>
    </g>
    <g transform="translate(920, 160)">
      <circle cx="0" cy="0" r="22" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
      <rect x="-2" y="-35" width="4" height="28" fill="#ffffff"/>
    </g>
    <g transform="translate(920, 240)">
      <circle cx="0" cy="0" r="22" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
      <rect x="-2" y="-35" width="4" height="28" fill="#ffffff"/>
    </g>
    <g transform="translate(920, 320)">
      <circle cx="0" cy="0" r="22" fill="#c62828" stroke="#ffffff" stroke-width="2"/>
      <rect x="-2" y="-35" width="4" height="28" fill="#ffffff"/>
    </g>
    
    <!-- Brand logo watermark (subtle) -->
    <text x="500" y="430" text-anchor="middle" fill="#444444" font-size="24" font-family="Inter, sans-serif" opacity="0.3">LOBlich</text>
  </g>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#heroGrad)" opacity="0.4"/>
</svg>